openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Shoplike Vintage Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: products
  - name: categories
  - name: orders
  - name: payments
  - name: customers
  - name: admin
  - name: settings
  - name: dashboard
  - name: upload

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Products ─────────────────────────────────────────────────
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products
      parameters:
        - name: section
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
        - name: sale
          in: query
          schema: { type: boolean }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured products
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                required: [success]

  # ── Categories ───────────────────────────────────────────────
  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List categories
      parameters:
        - name: section
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                required: [success]

  # ── Orders ────────────────────────────────────────────────────
  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: List orders (admin)
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/track/{ref}:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track order by reference
      parameters:
        - name: ref
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Payments (Korapay) ────────────────────────────────────────
  /payments/initiate:
    post:
      operationId: initiatePayment
      tags: [payments]
      summary: Initiate Korapay payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInitInput"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInitResult"

  /payments/verify/{reference}:
    get:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify Korapay payment
      parameters:
        - name: reference
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResult"

  # ── Customers ─────────────────────────────────────────────────
  /customers/signup:
    post:
      operationId: customerSignup
      tags: [customers]
      summary: Customer signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerSignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAuthResult"

  /customers/login:
    post:
      operationId: customerLogin
      tags: [customers]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAuthResult"

  /customers/me/orders:
    get:
      operationId: getMyOrders
      tags: [customers]
      summary: Get current customer orders
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # ── Admin ─────────────────────────────────────────────────────
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"

  # ── Settings ─────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get store settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update store settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # ── Dashboard ─────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics (admin)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/sales:
    get:
      operationId: getSalesStats
      tags: [dashboard]
      summary: Get sales chart data (admin)
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Sales data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesDay"

  # ── Upload ────────────────────────────────────────────────────
  /upload/image:
    post:
      operationId: uploadImage
      tags: [upload]
      summary: Upload product image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImageFileUpload"
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

  /upload/video:
    post:
      operationId: uploadVideo
      tags: [upload]
      summary: Upload product video
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/VideoFileUpload"
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    # ── Product ──────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        price: { type: number }
        comparePrice: { type: ["number", "null"] }
        section: { type: string }
        categoryId: { type: ["integer", "null"] }
        inStock: { type: boolean }
        stockQty: { type: ["integer", "null"] }
        sizes: { type: ["array", "null"], items: { type: string } }
        colors: { type: ["array", "null"], items: { type: string } }
        images: { type: ["array", "null"], items: { type: string } }
        videoUrl: { type: ["string", "null"] }
        isFeatured: { type: boolean }
        isOnSale: { type: boolean }
        createdAt: { type: string }
      required: [id, name, price, section, inStock, isFeatured, isOnSale, createdAt]

    ProductInput:
      type: object
      properties:
        name: { type: string }
        description: { type: ["string", "null"] }
        price: { type: number }
        comparePrice: { type: ["number", "null"] }
        section: { type: string }
        categoryId: { type: ["integer", "null"] }
        inStock: { type: boolean }
        stockQty: { type: ["integer", "null"] }
        sizes: { type: ["array", "null"], items: { type: string } }
        colors: { type: ["array", "null"], items: { type: string } }
        images: { type: ["array", "null"], items: { type: string } }
        videoUrl: { type: ["string", "null"] }
        isFeatured: { type: boolean }
        isOnSale: { type: boolean }
      required: [name, price, section, inStock]

    ProductUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: ["string", "null"] }
        price: { type: number }
        comparePrice: { type: ["number", "null"] }
        section: { type: string }
        categoryId: { type: ["integer", "null"] }
        inStock: { type: boolean }
        stockQty: { type: ["integer", "null"] }
        sizes: { type: ["array", "null"], items: { type: string } }
        colors: { type: ["array", "null"], items: { type: string } }
        images: { type: ["array", "null"], items: { type: string } }
        videoUrl: { type: ["string", "null"] }
        isFeatured: { type: boolean }
        isOnSale: { type: boolean }

    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
      required: [products, total, page, limit]

    # ── Category ─────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        section: { type: string }
        slug: { type: string }
        imageUrl: { type: ["string", "null"] }
      required: [id, name, section, slug]

    CategoryInput:
      type: object
      properties:
        name: { type: string }
        section: { type: string }
        slug: { type: string }
        imageUrl: { type: ["string", "null"] }
      required: [name, section, slug]

    CategoryUpdate:
      type: object
      properties:
        name: { type: string }
        section: { type: string }
        slug: { type: string }
        imageUrl: { type: ["string", "null"] }

    # ── Order ─────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        productId: { type: integer }
        name: { type: string }
        price: { type: number }
        qty: { type: integer }
        size: { type: ["string", "null"] }
        color: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
      required: [productId, name, price, qty]

    ShippingAddress:
      type: object
      properties:
        fullName: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        country: { type: string }
      required: [fullName, phone, address, city, state, country]

    Order:
      type: object
      properties:
        id: { type: integer }
        orderRef: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        total: { type: number }
        status: { type: string }
        paymentStatus: { type: string }
        paymentMethod: { type: ["string", "null"] }
        paymentRef: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        customerId: { type: ["integer", "null"] }
        createdAt: { type: string }
      required: [id, orderRef, items, shippingAddress, total, status, paymentStatus, createdAt]

    OrderInput:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        shippingAddress:
          $ref: "#/components/schemas/ShippingAddress"
        total: { type: number }
        notes: { type: ["string", "null"] }
        paymentMethod: { type: ["string", "null"] }
        customerId: { type: ["integer", "null"] }
      required: [items, shippingAddress, total]

    OrderStatusUpdate:
      type: object
      properties:
        status: { type: string }
      required: [status]

    OrderList:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
      required: [orders, total, page, limit]

    # ── Payment ──────────────────────────────────────────────────
    PaymentInitInput:
      type: object
      properties:
        orderId: { type: integer }
        amount: { type: number }
        email: { type: string }
        name: { type: string }
        phone: { type: ["string", "null"] }
      required: [orderId, amount, email, name]

    PaymentInitResult:
      type: object
      properties:
        checkoutUrl: { type: string }
        reference: { type: string }
      required: [checkoutUrl, reference]

    PaymentVerifyResult:
      type: object
      properties:
        status: { type: string }
        amount: { type: number }
        reference: { type: string }
      required: [status, amount, reference]

    # ── Customer ─────────────────────────────────────────────────
    CustomerSignupInput:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: ["string", "null"] }
      required: [name, email, password]

    CustomerLoginInput:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, name, email, createdAt]

    CustomerAuthResult:
      type: object
      properties:
        token: { type: string }
        customer:
          $ref: "#/components/schemas/Customer"
      required: [token, customer]

    # ── Admin ─────────────────────────────────────────────────────
    AdminLoginInput:
      type: object
      properties:
        password: { type: string }
      required: [password]

    AdminAuthResult:
      type: object
      properties:
        token: { type: string }
      required: [token]

    # ── Settings ─────────────────────────────────────────────────
    Settings:
      type: object
      properties:
        storeName: { type: string }
        storeEmail: { type: ["string", "null"] }
        storePhone: { type: ["string", "null"] }
        whatsappNumber: { type: ["string", "null"] }
        currency: { type: string }
        korapayEnabled: { type: boolean }
        korapayPublicKey: { type: ["string", "null"] }
        korapaySecretKey: { type: ["string", "null"] }
        korapayEncKey: { type: ["string", "null"] }
        smsApiKey: { type: ["string", "null"] }
        smsEnabled: { type: boolean }
        emailApiKey: { type: ["string", "null"] }
        emailEnabled: { type: boolean }
        bannerText: { type: ["string", "null"] }
        bannerEnabled: { type: boolean }
      required: [storeName, currency, korapayEnabled, smsEnabled, emailEnabled, bannerEnabled]

    SettingsUpdate:
      type: object
      properties:
        storeName: { type: string }
        storeEmail: { type: ["string", "null"] }
        storePhone: { type: ["string", "null"] }
        whatsappNumber: { type: ["string", "null"] }
        currency: { type: string }
        korapayEnabled: { type: boolean }
        korapayPublicKey: { type: ["string", "null"] }
        korapaySecretKey: { type: ["string", "null"] }
        korapayEncKey: { type: ["string", "null"] }
        smsApiKey: { type: ["string", "null"] }
        smsEnabled: { type: boolean }
        emailApiKey: { type: ["string", "null"] }
        emailEnabled: { type: boolean }
        bannerText: { type: ["string", "null"] }
        bannerEnabled: { type: boolean }

    # ── Dashboard ─────────────────────────────────────────────────
    TopProduct:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        totalSold: { type: integer }
        revenue: { type: number }
      required: [id, name, totalSold, revenue]

    DashboardStats:
      type: object
      properties:
        totalRevenue: { type: number }
        totalOrders: { type: integer }
        pendingOrders: { type: integer }
        totalProducts: { type: integer }
        todayOrders: { type: integer }
        todayRevenue: { type: number }
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/TopProduct"
      required: [totalRevenue, totalOrders, pendingOrders, totalProducts, todayOrders, todayRevenue, topProducts]

    SalesDay:
      type: object
      properties:
        date: { type: string }
        revenue: { type: number }
        orders: { type: integer }
      required: [date, revenue, orders]

    # ── Upload ────────────────────────────────────────────────────
    ImageFileUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
      required: [file]

    VideoFileUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
      required: [file]

    UploadResult:
      type: object
      properties:
        url: { type: string }
        filename: { type: string }
      required: [url, filename]
